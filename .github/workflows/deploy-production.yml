# Deploy Accounting to production on every push to main.
# One-time: add GitHub repo secrets (see OPERATIONS.md → GitHub Actions secrets).

name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: accounting-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_NAME: b2ccoop-accounting
      ACCOUNTING_API_URL: https://b2ccoop-accounting-production.up.railway.app
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      DEPLOY_UI: "1"
      WIRE_WEBAPP: "0"
      CI: "true"
      # Vite build (Pages)
      VITE_API_BASE_URL: https://b2ccoop-accounting-production.up.railway.app
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_WEBAPP_URL: https://b2ccoop.com
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Install backend dependencies
        run: npm ci

      - name: Deploy (Railway API + Cloudflare Pages)
        working-directory: ${{ github.workspace }}
        run: bash scripts/railway-deploy-production.sh
