# Deploy Accounting to production on every push to main.
# Secrets: OPERATIONS.md → GitHub Actions secrets

name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: accounting-production
  cancel-in-progress: true

env:
  RAILWAY_SERVICE_NAME: b2ccoop-accounting
  ACCOUNTING_API_URL: https://b2ccoop-accounting-production.up.railway.app

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      DEPLOY_API: "1"
      DEPLOY_UI: "0"
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy API (Railway)
        run: bash scripts/railway-deploy-production.sh

  deploy-ui:
    runs-on: ubuntu-latest
    needs: deploy-api
    env:
      ACCOUNTING_API_URL: https://b2ccoop-accounting-production.up.railway.app
      DEPLOY_API: "0"
      DEPLOY_UI: "1"
      WIRE_WEBAPP: "0"
      CI: "true"
      VITE_API_BASE_URL: https://b2ccoop-accounting-production.up.railway.app
      VITE_WEBAPP_URL: https://b2ccoop.com
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy UI (Cloudflare Pages)
        run: bash scripts/railway-deploy-production.sh
